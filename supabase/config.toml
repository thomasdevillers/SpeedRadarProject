project_id = "roadsafe-radar-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback", "https://portal.roadsafe.co.za/auth/callback"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true
file_size_limit = "15MiB"

[functions.process-events]
verify_jwt = false

[functions.retention]
verify_jwt = false

[functions.brevo-webhook]
verify_jwt = false

